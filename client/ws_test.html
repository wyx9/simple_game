<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Game — WebSocket 测试客户端</title>
<style>
  :root {
    --bg: #1a1a2e; --panel: #16213e; --border: #0f3460;
    --text: #eee; --dim: #888; --green: #4ade80; --red: #f87171;
    --blue: #60a5fa; --yellow: #facc15;
  }
  * { box-sizing:border-box; margin:0; padding:0 }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text);
         display:flex; height:100vh; overflow:hidden }
  /* sidebar */
  .sidebar { width:320px; min-width:320px; background:var(--panel); border-right:1px solid var(--border);
             display:flex; flex-direction:column; padding:16px; gap:14px; overflow-y:auto }
  .sidebar h2 { font-size:16px; color:var(--blue); border-bottom:1px solid var(--border); padding-bottom:8px }
  .sidebar h3 { font-size:13px; color:var(--dim); margin-bottom:-8px }
  label { font-size:12px; color:var(--dim); display:block; margin-bottom:2px }
  input,button,select { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:6px;
          font-size:13px; outline:none }
  input,select { background:#0a0a1a; color:var(--text) }
  input:focus { border-color:var(--blue) }
  button { cursor:pointer; font-weight:600; transition:all .2s; border:none }
  .btn-connect { background:var(--green); color:#000 }
  .btn-connect.connected { background:var(--red) }
  .btn-send { background:var(--blue); color:#000; margin-top:4px }
  .btn-clear { background:var(--border); color:var(--text) }
  .row { display:flex; gap:8px }
  .row>* { flex:1 }
  .status { font-size:12px; padding:6px 10px; border-radius:4px; text-align:center; font-weight:600 }
  .status.on { background:#166534; color:var(--green) }
  .status.off { background:#7f1d1d; color:var(--red) }
  /* msg area */
  .main { flex:1; display:flex; flex-direction:column; min-width:0 }
  .msg-header { padding:12px 16px; background:var(--panel); border-bottom:1px solid var(--border);
                display:flex; justify-content:space-between; align-items:center }
  .msg-header h2 { font-size:15px }
  .msg-count { font-size:12px; color:var(--dim) }
  .msg-list { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:4px }
  .msg { padding:6px 10px; border-radius:4px; font-size:13px; font-family:'Cascadia Code',Consolas,monospace;
         white-space:pre-wrap; word-break:break-all }
  .msg.sent { background:#0f346044; border-left:3px solid var(--blue); color:#93c5fd }
  .msg.recv { background:#16653444; border-left:3px solid var(--green); color:#86efac }
  .msg.info { background:#713f1244; border-left:3px solid var(--yellow); color:#fde68a }
  .msg.error { background:#7f1d1d44; border-left:3px solid var(--red); color:#fca5a5 }
  .msg .ts { font-size:11px; color:var(--dim); margin-right:8px }
  .empty-log { color:var(--dim); text-align:center; margin-top:40px; font-size:14px }
  /* heartbeat indicator */
  .hb { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--dim);
        margin-right:6px; transition:background .3s }
  .hb.live { background:var(--green); box-shadow:0 0 6px var(--green) }
  .preset-btns { display:flex; flex-wrap:wrap; gap:4px }
  .preset-btns button { width:auto; padding:4px 10px; font-size:11px }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>⚙️ 连接设置</h2>
  <div>
    <label>服务器地址</label>
    <div class="row">
      <input id="host" value="127.0.0.1" style="flex:2" placeholder="host">
      <input id="port" value="8889" style="flex:1" placeholder="port">
    </div>
  </div>
  <div>
    <label>路径</label>
    <input id="path" value="/ws" placeholder="/ws">
  </div>
  <button id="btnConn" class="btn-connect" onclick="toggleConnect()">🔌 连接</button>
  <div id="status" class="status off">⚫ 未连接</div>

  <h2>📤 发送消息</h2>

  <h3>LoginReq</h3>
  <div>
    <label>UUID</label>
    <input id="uuid" value="12345678" type="number">
  </div>
  <div>
    <label>Name</label>
    <input id="name" value="test_player" placeholder="角色名">
  </div>
  <div>
    <label>PassWord</label>
    <input id="password" value="123" placeholder="密码">
  </div>
  <button class="btn-send" onclick="sendLogin()">🔑 发送 LoginReq</button>

  <div style="border-top:1px solid var(--border)"></div>

  <h3>HeartReq</h3>
  <div class="row">
    <button class="btn-send" onclick="sendHeartbeat()" style="flex:2">💓 发送心跳</button>
    <button id="btnAutoHb" onclick="toggleAutoHb()" style="flex:1;background:var(--border);color:var(--text)">自动: 关</button>
  </div>

  <div style="border-top:1px solid var(--border)"></div>

  <h3>预设消息</h3>
  <div class="preset-btns">
    <button onclick="setName('player_001');sendLogin()">player_001</button>
    <button onclick="setName('player_002');sendLogin()">player_002</button>
    <button onclick="setName('player_003');sendLogin()">player_003</button>
    <button onclick="sendHeartbeat()">心跳 ×1</button>
    <button onclick="sendHeartbeatN(3)">心跳 ×3</button>
  </div>

  <button class="btn-clear" onclick="clearLog()" style="margin-top:auto">🗑️ 清空日志</button>
</div>

<!-- Message area -->
<div class="main">
  <div class="msg-header">
    <h2>📋 消息日志</h2>
    <span class="msg-count" id="msgCount">0 条</span>
  </div>
  <div class="msg-list" id="msgList">
    <div class="empty-log">等待消息...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/protobufjs@7.4.0/dist/protobuf.min.js"></script>
<script>if(typeof protobuf==='undefined'){alert('加载 protobuf.js 失败，请检查网络连接。\n\n可尝试使用国内镜像：\nhttps://unpkg.zhimg.com/protobufjs@7.4.0/dist/protobuf.min.js');}</script>
<script>
// ── DOM refs ──
const $ = id => document.getElementById(id);
const hostEl = $('host'), portEl = $('port'), pathEl = $('path');
const btnConn = $('btnConn'), statusEl = $('status');
const msgList = $('msgList'), msgCount = $('msgCount');
const btnAutoHb = $('btnAutoHb');

// ── State ──
let ws = null;
let connected = false;
let autoHb = false;
let autoHbTimer = null;
let msgId = 0;
let protoRoot = null;

// ── Protobuf schema (embedded from api/protos/user.proto) ──
const PROTO_SCHEMA = `
syntax = "proto3";
package pt;
option go_package = "simple_game/api/protos/pt";

message LoginReq {
  int64 UUid = 1;
  string Name = 2;
  string PassWord = 3;
}
message LoginRes {
  int64 UUid = 1;
  int32 Code = 2;
}
message HeartReq {}
message HeartRes {
  int64 Time = 1;
}
`;

async function initProtobuf() {
  protoRoot = protobuf.parse(PROTO_SCHEMA).root;
  addLog('info', 'Protobuf 初始化完成');
}

// ── Connect / Disconnect ──
function toggleConnect() {
  connected ? disconnect() : connect();
}

function connect() {
  const host = hostEl.value.trim() || '127.0.0.1';
  const port = portEl.value.trim() || '8889';
  const path = pathEl.value.trim() || '/ws';
  const url = `ws://${host}:${port}${path}`;

  addLog('info', `正在连接 ${url} ...`);
  try {
    ws = new WebSocket(url);
  } catch(e) {
    addLog('error', `创建连接失败: ${e.message}`);
    return;
  }

  ws.onopen = () => {
    connected = true;
    updateUI();
    addLog('info', `✅ 已连接到 ${url}`);
    // 自动发送 LoginReq（服务端要求 10s 内完成登录，否则超时断开）
    setTimeout(() => sendLogin(), 300);
  };

  ws.onmessage = (e) => {
    addLog('recv', e.data);
  };

  ws.onerror = (e) => {
    addLog('error', 'WebSocket 错误');
  };

  ws.onclose = (e) => {
    connected = false;
    updateUI();
    stopAutoHb();
    addLog('info', `🔌 连接关闭 (code: ${e.code})`);
    ws = null;
  };
}

function disconnect() {
  stopAutoHb();
  if (ws) {
    ws.close(1000, '用户主动断开');
    ws = null;
  }
  connected = false;
  updateUI();
}

function updateUI() {
  if (connected) {
    btnConn.textContent = '❌ 断开';
    btnConn.classList.add('connected');
    statusEl.textContent = '🟢 已连接';
    statusEl.className = 'status on';
  } else {
    btnConn.textContent = '🔌 连接';
    btnConn.classList.remove('connected');
    statusEl.textContent = '⚫ 未连接';
    statusEl.className = 'status off';
  }
}

// ── Send helpers ──
function sendPacket(name, protoMsg) {
  if (!connected || !ws) {
    addLog('error', '未连接到服务器');
    return;
  }
  // 1) proto encode
  const MessageClass = protoRoot.lookupType(`pt.${name}`);
  if (!MessageClass) { addLog('error', `未找到消息类型: pt.${name}`); return; }
  const err = MessageClass.verify(protoMsg);
  if (err) { addLog('error', `Proto verify: ${err}`); return; }
  const binary = MessageClass.encode(MessageClass.create(protoMsg)).finish();
  // 2) Uint8Array → base64 (避免大数组展开导致栈溢出)
  let binStr = '';
  for (let i = 0; i < binary.length; i++) binStr += String.fromCharCode(binary[i]);
  const base64 = btoa(binStr);
  // 3) PacketMsg JSON
  const packet = JSON.stringify({ name: name, data: base64 });
  // 4) send as WS text frame
  ws.send(packet);
  addLog('sent', JSON.stringify({ name, ...protoMsg }));
}

function sendLogin() {
  const uuid = parseInt($('uuid').value) || 12345678;
  const name = $('name').value.trim() || 'test';
  const password = $('password').value.trim() || '123';
  sendPacket('LoginReq', { UUid: uuid, Name: name, PassWord: password });
}

function sendHeartbeat() {
  sendPacket('HeartReq', {});
}

function sendHeartbeatN(n) {
  for (let i = 0; i < n; i++) setTimeout(sendHeartbeat, i * 200);
}

// ── Auto heartbeat ──
function toggleAutoHb() {
  autoHb ? stopAutoHb() : startAutoHb();
}

function startAutoHb() {
  autoHb = true;
  btnAutoHb.textContent = '自动: 开';
  btnAutoHb.style.background = 'var(--green)';
  btnAutoHb.style.color = '#000';
  sendHeartbeat();
  autoHbTimer = setInterval(sendHeartbeat, 3000);
  addLog('info', '自动心跳已开启 (3s 间隔)');
}

function stopAutoHb() {
  autoHb = false;
  btnAutoHb.textContent = '自动: 关';
  btnAutoHb.style.background = 'var(--border)';
  btnAutoHb.style.color = 'var(--text)';
  if (autoHbTimer) { clearInterval(autoHbTimer); autoHbTimer = null; }
}

// ── Helpers ──
function setName(name) { $('name').value = name; }

function addLog(type, text) {
  const div = document.createElement('div');
  const ts = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  div.className = `msg ${type}`;
  div.innerHTML = `<span class="ts">${ts}</span>${escHtml(text)}`;
  // remove empty placeholder
  const empty = msgList.querySelector('.empty-log');
  if (empty) empty.remove();
  msgList.appendChild(div);
  msgList.scrollTop = msgList.scrollHeight;
  msgId++;
  msgCount.textContent = `${msgId} 条`;
}

function clearLog() {
  msgList.innerHTML = '<div class="empty-log">等待消息...</div>';
  msgId = 0;
  msgCount.textContent = '0 条';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ──
initProtobuf();
updateUI();
</script>
</body>
</html>
